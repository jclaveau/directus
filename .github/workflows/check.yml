name: Check

# Scalabus: run the full gate on EVERY commit (any branch) plus every PR — not just PRs into
# the release branches. hhh-dev became the work branch after the old base-branch filter was set,
# so that filter silently skipped it (no unit tests, no coverage upload codecov needs). `push:`
# (unfiltered) covers every commit; GHA loads a push workflow from the pushed branch itself, so it
# fires regardless of base. `pull_request:` keeps the merge-ref context + the diff-scoped style gate
# (note: pull_request workflows load from the PR's BASE branch, so this trigger only updates once
# the change lands on the base).
on:
  pull_request:

  push:

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max_old_space_size=6144

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46

      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          build: false

      - name: Run Linter
        run: pnpm exec eslint ${{ steps.changed-files.outputs.all_changed_files }}

  stylelint:
    name: Stylelint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46

      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          build: false

      - name: Run Stylelinter
        run: pnpm exec stylelint ${{ steps.changed-files.outputs.all_changed_files }} --allow-empty-input

  format:
    name: Format
    # `eslint.style.config.js` (via the Style (changes) job / `pnpm lint:style:changes`) is the
    # style authority. Kept as a passing no-op so a required "Format" check (if branch protection
    # still lists it) goes green instead of stranding pending.
    runs-on: ubuntu-latest
    steps:
      - name: Format check
        run: echo "Formatting handled by eslint.style.config.js (see the Style (changes) job)."

  style-changes:
    name: Style (changes)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history so the script can diff against the merge-base with the PR base.
          fetch-depth: 0

      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          build: false

      # eslint max-len (comment width) over added lines only (mirrors `pnpm lint:style:changes`).
      - name: Check changed-line style
        run: node scripts/lint-style-changes.mjs "${{ github.event.pull_request.base.sha }}"

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

        # This currently builds all packages in the repo. Ideally we add build: false here as well
        # to save minutes building the repo, but that'd require us refactoring the tests to stop
        # using @directus/* packages within tests
      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Run Tests
        run: pnpm test:coverage --passWithNoTests

      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true # Scalabus: a failed upload must not red the test job
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # required: protected repo rejects tokenless uploads
        run: |
          # Download and install Codecov uploader
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov

          # Find all coverage files and upload them with flags based on folder names
          find . -name "coverage-final.json" -path "*/coverage/*" | while read -r coverage_file; do
            # Extract the folder name that contains the coverage directory
            folder_name=$(echo "$coverage_file" | sed -E 's|.*/(.*)/coverage/.*|\1|')
            echo "Uploading coverage for $folder_name from $coverage_file"

            # Upload to codecov with folder name as flag
            ./codecov upload-coverage -f "$coverage_file" -F "$folder_name" -Z --disable-search
          done
