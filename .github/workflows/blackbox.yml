name: Blackbox Tests

on:
  push:
    branches:
      - main
      - v11.10.1-prepare
    paths:
      - api/**
      - tests/blackbox/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/blackbox.yml
  workflow_call:
    inputs:
      full:
        description: 'Run the full DB matrix (all vendors) instead of the pg+sqlite smoke set'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: blackbox-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max_old_space_size=6144

jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      vendors: ${{ steps.matrix.outputs.vendors }}
    steps:
      # Default DB matrix is the pg+sqlite smoke set. The full vendor matrix runs on a
      # push to a trunk branch, or on a PR carrying the `Blackbox-Full` label (passed in
      # as `inputs.full` by blackbox-pr.yml).
      - name: Select vendor matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.full }}" = "true" ]; then
            echo 'vendors=["sqlite3","postgres","mysql","maria","mssql","oracle"]' >> "$GITHUB_OUTPUT"
          else
            echo 'vendors=["sqlite3","postgres"]' >> "$GITHUB_OUTPUT"
          fi

  common:
    name: common
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Start services
        run:
          docker compose -f tests/blackbox/docker-compose.yml up auth-saml redis minio minio-mc -d --quiet-pull --wait

      - name: Run tests
        run: TEST_DB=sqlite3 pnpm run test:blackbox --project common

  db:
    name: ${{ matrix.vendor }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Smoke set (sqlite3 + postgres) by default; full vendor set when setup selects it.
        # cockroachdb stays excluded everywhere for now.
        vendor: ${{ fromJSON(needs.setup.outputs.vendors) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Start database
        if: matrix.vendor != 'sqlite3'
        run: docker compose -f tests/blackbox/docker-compose.yml up ${{ matrix.vendor }} -d --quiet-pull --wait

      - name: MSSQL Set Compatibility Level
        if: matrix.vendor == 'mssql'
        run: |
          for i in {1..30}
          do
            docker exec blackbox-mssql-1 \
              /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Test@123' -C \
              -Q "SELECT 1" && break
            sleep 2
          done
          docker exec blackbox-mssql-1 \
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Test@123' -C \
            -Q "ALTER DATABASE model SET COMPATIBILITY_LEVEL = 150" \
            -l 30
          echo "MSSQL compatibility level set successfully"

      - name: Start services
        run:
          docker compose -f tests/blackbox/docker-compose.yml up auth-saml redis minio minio-mc -d --quiet-pull --wait

      - name: Run tests
        run: TEST_DB=${{ matrix.vendor }} pnpm run test:blackbox --project db
