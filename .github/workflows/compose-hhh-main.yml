# Composes the `hhh-main` integration branch = "main as it would be if our
# proposed PRs were accepted upstream".
#
# hhh-main is DERIVED, never authored. It is force-rebuilt from:
#   - fork `main` (synced from upstream directus/directus), plus
#   - the TREE of open, non-draft `hhh-main-root:` / `hhh-main-stacked:` copy
#     PRs, applied in dependency order (a stacked copy after its parent copy).
#
# These copies are the CONFLICT-RESOLVED form of the isolated `upstream-draft:`
# PRs (which stay clean off `main` for upstream submission). Compose consumes the
# copies, so it no longer blocks on raw inter-PR conflicts — a conflict here now
# means the stack is STALE vs `main` and must be re-rebased (each copy PR carries
# its re-rebase recipe). Build the stack with a manual call; see #67.
#
# Never commit directly to hhh-main — this workflow force-pushes over it.
#
# Policy (all-or-nothing):
#   - Any PR that does not merge cleanly (or whose base never resolves) BLOCKS
#     the whole run — no partial publish. The full tree is still attempted so
#     every conflict is reported in one run, then the job fails.
#   - A composed tree that fails build/api-tests also BLOCKS the publish.
#   - hhh-main is only ever force-pushed when the ENTIRE tree merges clean+green;
#     otherwise it keeps pointing at the last fully-composed tree.
name: compose-hhh-main

on:
  schedule:
    - cron: '17 6 * * *' # daily; offset minute to dodge the top-of-hour rush
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed, ready_for_review]
    branches: [main]

# Collapse rapid re-runs (a burst of PR pushes) onto one compose.
concurrency:
  group: compose-hhh-main
  cancel-in-progress: true

permissions:
  contents: write # push main + force-push hhh-main
  pull-requests: read # discover open PRs
  issues: write # report skipped PRs / red tests

jobs:
  compose:
    runs-on: ubuntu-latest
    # Skip the compare PR #67 (hhh-main -> main): each compose force-pushes
    # hhh-main over an SSH deploy key, and SSH/PAT pushes (unlike GITHUB_TOKEN)
    # re-fire workflows — so a #67 `synchronize` would re-compose, push, and
    # loop forever. Schedule / dispatch / draft-PR triggers still run.
    if: github.event_name != 'pull_request' || github.head_ref != 'hhh-main'
    # Cross-repo PRs run with a read-only token and no secrets, so they cannot
    # push. The scheduled run is the reliable path; PR triggers only help for
    # same-repo branches.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push over an SSH deploy key, not GITHUB_TOKEN: App tokens are forbidden
          # from pushing workflow-file changes, which both the main sync (upstream
          # edits .github/*) and the hhh-main force-push carry. SSH is not an App
          # token, so it is exempt.
          ssh-key: ${{ secrets.COMPOSE_SSH_KEY }}

      - name: Configure git identity
        run: |
          git config user.name "hhh-bot"
          git config user.email "hhh-bot@users.noreply.github.com"

      - name: Sync fork main from upstream
        run: |
          git remote add upstream https://github.com/directus/directus.git
          git fetch upstream main
          # checkout lands on the PR merge ref (detached HEAD), and fetching
          # upstream/main makes a bare `git checkout main` ambiguous (two remotes
          # carry main). Pin the source explicitly so git's DWIM never guesses.
          git checkout -B main origin/main
          # main = upstream + our thin overlay (this workflow), so it is ahead
          # of upstream and cannot fast-forward. Merge keeps the overlay; stays
          # clean unless upstream edits the same file.
          git merge upstream/main -m "Sync upstream into main"
          git push origin main

      - name: Discover open hhh-main copy PRs
        id: discover
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The compose input is the resolved copy tree: `hhh-main-root:` (isolated,
          # base main) and `hhh-main-stacked:` (rebased on a parent copy). Any base,
          # so stacked copies are included and applied after their parent.
          # `experiments` / `superseded` labels exclude an otherwise-matching copy.
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 200 \
            --json number,headRefName,baseRefName,isDraft,title,labels \
            --jq '[.[]
              | select(.isDraft | not)
              | select(.title | startswith("hhh-main-root: ") or startswith("hhh-main-stacked: "))
              | select(any(.labels[].name; . == "experiments" or . == "superseded") | not)]' \
            > prs.json
          echo "Discovered PRs:"; jq -r '.[] | "  #\(.number) \(.baseRefName) <- \(.headRefName)"' prs.json
          echo "count=$(jq length prs.json)" >> "$GITHUB_OUTPUT"

      - name: Compose hhh-main
        id: compose
        run: |
          git checkout -B hhh-main main
          # Apply the PR tree in dependency order. A PR whose base is `main` (or any
          # branch that is not itself a selected PR head) is a ROOT, applied first.
          # A PR stacked on another PR's head waits until that parent merges.
          # Skip-on-conflict, and cascade-skip the descendants of a skipped PR so a
          # conflicted parent can't slip in through its child's branch.
          declare -A STATUS IS_HEAD
          mapfile -t ROWS < <(jq -c '.[]' prs.json)
          for r in "${ROWS[@]}"; do IS_HEAD["$(jq -r .headRefName <<<"$r")"]=1; done
          pending=("${ROWS[@]}"); merged=""; skip_conflict=""; skip_dep=""; progress=1
          while [ ${#pending[@]} -gt 0 ] && [ "$progress" -eq 1 ]; do
            progress=0; next=()
            for r in "${pending[@]}"; do
              num=$(jq -r .number <<<"$r"); head=$(jq -r .headRefName <<<"$r"); base=$(jq -r .baseRefName <<<"$r")
              if [ "$base" = "main" ] || [ -z "${IS_HEAD[$base]:-}" ]; then baseskip=0
              elif [ "${STATUS[$base]:-}" = "merged" ]; then baseskip=0
              elif [ "${STATUS[$base]:-}" = "skipped" ]; then baseskip=1
              else next+=("$r"); continue; fi   # parent still pending — revisit next pass
              progress=1
              if [ "$baseskip" = 1 ]; then
                STATUS[$head]=skipped; skip_dep="$skip_dep #$num"
                echo "::warning::PR #$num skipped — its base PR was skipped"; continue
              fi
              # refs/pull/N/head works for same-repo AND cross-repo PR heads.
              git fetch origin "refs/pull/$num/head:pr-$num"
              if git merge --no-ff -m "Integrate #$num" "pr-$num"; then
                STATUS[$head]=merged; merged="$merged #$num"; echo "merged #$num"
              else
                git merge --abort; STATUS[$head]=skipped; skip_conflict="$skip_conflict #$num"
                echo "::warning::PR #$num does not merge cleanly into hhh-main — skipped"
              fi
            done
            pending=("${next[@]}")
          done
          # Anything still pending depends on a branch that is neither main nor a
          # merged/skipped selected head — a base cycle or an unknown base.
          skip_cycle=""
          for r in "${pending[@]:-}"; do [ -n "$r" ] && skip_cycle="$skip_cycle #$(jq -r .number <<<"$r")"; done
          echo "merged=$merged"
          { echo "merged=$merged"
            echo "skip_conflict=$skip_conflict"
            echo "skip_dep=$skip_dep"
            echo "skip_cycle=$skip_cycle"
            echo "skipped=$skip_conflict$skip_dep$skip_cycle"; } >> "$GITHUB_OUTPUT"
          # A clean tree is all-or-nothing: any PR that won't merge (or whose base
          # never resolved) BLOCKS the run. The whole loop still ran so every
          # conflict is reported at once, but we fail now — Publish (if: success())
          # is skipped, so hhh-main keeps pointing at the last fully-composed tree.
          if [ -n "$skip_conflict$skip_cycle" ]; then
            echo "::error::Stack is stale vs main — re-rebase these copies:$skip_conflict$skip_cycle (dependents:$skip_dep). See each copy PR's re-rebase recipe."
            exit 1
          fi

      - name: Allowlist compose bot for CLA
        # hhh-main's "Integrate #N" commits are authored by hhh-bot. directus/cla-bot
        # reads contributors.yml from the head ref (hhh-main), so the bot must be
        # signed there. Inject it here rather than storing it on main — keeps main
        # a clean upstream base; the entry lives only on the derived hhh-main.
        run: |
          if ! grep -qxF '- hhh-bot' contributors.yml; then
            echo '- hhh-bot' >> contributors.yml
            git add contributors.yml
            git commit -m "ci: sign CLA for hhh-bot (compose identity)"
          fi

      - name: Install + build
        uses: ./.github/actions/prepare

      - name: Test api
        run: pnpm --filter @directus/api test

      - name: Publish hhh-main
        if: success()
        # Force: hhh-main is a derived branch, fast-forwarded main slides under
        # it every run. Concurrency group above prevents racing pushes.
        run: git push --force origin hhh-main

      - name: Report skipped PRs or failed tests
        if: always() && (steps.compose.outputs.skipped != '' || failure())
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="compose-hhh-main: integration needs attention"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          body="Last \`compose-hhh-main\` run ($run_url) could not produce a clean, green hhh-main."
          if [ -n "${{ steps.compose.outputs.skip_conflict }}" ]; then
            body="$body"$'\n\n'"**Skipped (merge conflict):**${{ steps.compose.outputs.skip_conflict }}"
          fi
          if [ -n "${{ steps.compose.outputs.skip_dep }}" ]; then
            body="$body"$'\n\n'"**Skipped (base PR was skipped):**${{ steps.compose.outputs.skip_dep }}"
          fi
          if [ -n "${{ steps.compose.outputs.skip_cycle }}" ]; then
            body="$body"$'\n\n'"**Skipped (unresolved/cyclic base):**${{ steps.compose.outputs.skip_cycle }}"
          fi
          if [ "${{ job.status }}" = "failure" ]; then
            body="$body"$'\n\n'"**Build or api tests failed** — hhh-main was NOT force-pushed and still points at the previous green tree."
          fi
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title $title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi
