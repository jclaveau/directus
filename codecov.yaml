coverage:
  status:
    # Aggregate (non-flag) diff coverage is BLOCKING at a fixed 90% bar — new code must be
    # ≥90% covered (was `auto` ≈ project%, which let weakly-covered diffs through).
    patch:
      default:
        target: 90%
        informational: false
    # Overall coverage stays report-only: on a stacked feature line it mostly reflects
    # base drift, not the PR's own diff (see the per-PR coverage diagnoses).
    project:
      default:
        informational: true

# Controllers (and auth drivers) used to be ignored — thin HTTP guards exercised only by the
# blackbox suite, which fed no codecov flag, so they could not lift patch coverage. The
# `blackbox` flag (instrumented build → __coverage__ dump → merged lcov, see blackbox.yml)
# now carries their integration coverage, so the ignore is dropped.
# Build configs (tsdown/vite/rollup/vitest) are consumed by the bundler, never imported by a
# test, so they are always 0% covered — exclude them rather than red every build-tooling PR.
ignore:
  - '**/*.config.ts'
  - '**/*.config.js'
  # Coverage-build / integration glue that can't feed the unit patch flag: the COVERAGE_DIR
  # coverage dump (runs only in instrumented builds, on shutdown) and its merge script, plus the
  # extension controller's request guards (install needs a live registry — no blackbox harness).
  - 'api/src/utils/dump-coverage.ts'
  - 'api/src/controllers/extensions.ts'
  - 'tests/blackbox/merge-coverage.mjs'
  # Lint/style tooling for the diff-scoped style gate: a custom eslint rule and its CI runner,
  # exercised by eslint / the gate itself, not by unit tests. (eslint.style.config.js already
  # falls under the *.config.js rule above.)
  - 'eslint-rules/**'
  - 'scripts/lint-style-changes.mjs'
  # Migrations are DDL, run against a real DB by the migration runner — never unit-tested.
  - 'api/src/database/migrations/**'

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 5%
        informational: true # Scalabus: report-only ramp; flip to blocking once baseline + dialect tests land
      - type: patch
        target: 80%
        informational: true # Scalabus: report-only ramp; flip to blocking once baseline + dialect tests land
  individual_flags:
    # Blackbox is label-gated (runs only with the "Run Blackbox" label), so carryforward keeps
    # its integration coverage alive on PRs that don't re-run it. Report-only: the suite is slow
    # and containerised, so it must never block. NOTE: a controller/auth-driver diff on a PR that
    # does NOT run blackbox is covered only for unchanged lines via carryforward — the changed
    # lines stay uncovered and can red the (blocking) aggregate patch. Open question on the PR:
    # run blackbox unconditionally, or keep these paths ignored until it is non-gated.
    - name: blackbox
      carryforward: true
      statuses:
        - type: project
          informational: true
        - type: patch
          informational: true

comment:
  layout: 'header, diff, flags'
