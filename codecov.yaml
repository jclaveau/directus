# Aggregate (non-flag) statuses — report-only too, so the overall codecov/patch +
# codecov/project don't red feature PRs during the ramp. Flip to blocking later.
coverage:
  status:
    patch:
      default:
        informational: true
    project:
      default:
        informational: true

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 5%
        informational: true # Scalabus: report-only ramp; flip to blocking once baseline + dialect tests land
      - type: patch
        target: 80%
        informational: true # Scalabus: report-only ramp; flip to blocking once baseline + dialect tests land

comment:
  layout: 'header, diff, flags'
  require_changes: 'coverage_drop AND uncovered_patch'
